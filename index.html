<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StS2 Workout Companion</title>
  <link rel="stylesheet" href="styles.css?v=4" />
</head>
<body>
  <header class="topbar">
    <div class="total-block">
      <span class="total-label">Total reps</span>
      <span id="total" class="total-value">0</span>
    </div>

    <div class="timer-block">
      <span class="timer-label">Combat</span>
      <span id="timer" class="timer-value">00:00</span>
      <div class="timer-controls">
        <button id="timer-start" class="timer-btn timer-start" type="button">Start</button>
        <button id="timer-stop" class="timer-btn timer-stop" type="button">Stop</button>
        <button id="timer-reset" class="timer-btn timer-reset" type="button">Reset</button>
      </div>
    </div>

    <div class="topbar-actions">
      <button id="clear-all" class="clear-btn" type="button">Clear All</button>
      <button id="clear-history" class="clear-btn clear-history-btn" type="button">Clear History</button>
    </div>
  </header>

  <div class="global-mult-bar">
    <span class="global-mult-title">Global Multiplier</span>
    <div class="global-mult-control">
      <button id="global-mult-minus" class="step-btn global-mult-step" type="button" aria-label="Decrease global multiplier">−</button>
      <span id="global-mult-readout" class="global-mult-readout">×1</span>
      <button id="global-mult-plus" class="step-btn global-mult-step" type="button" aria-label="Increase global multiplier">+</button>
    </div>
  </div>

  <main>
    <section class="panel">
      <h2 class="panel-title">Events</h2>
      <div id="buttons" class="buttons-grid"></div>
    </section>

    <section class="panel">
      <h2 class="panel-title">Tracker</h2>
      <ul id="tracker" class="tracker-list"></ul>
      <p id="tracker-empty" class="tracker-empty">No events yet. Click an event to start.</p>
    </section>

    <section class="panel history-panel">
      <h2 class="panel-title">History</h2>
      <ul id="history" class="history-list"></ul>
      <p id="history-empty" class="history-empty">No history yet. Press Clear All to log a session.</p>
    </section>
  </main>

  <script src="history.js?v=1"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
